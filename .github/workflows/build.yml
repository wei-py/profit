name: Release App

on:
  push:
    branches: [master, main]

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with: {version: 9}
      - uses: actions/setup-node@v6
        with: {node-version: 22, cache: pnpm}
      - uses: dtolnay/rust-toolchain@stable
      - name: Restore updater private key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: node -e "require('fs').writeFileSync('src-tauri/profit-updater.key', process.env.TAURI_SIGNING_PRIVATE_KEY.trim())"
      - run: pnpm install --frozen-lockfile
      - run: pnpm tbuild
      - uses: actions/upload-artifact@v7
        with:
          name: mac-artifacts
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

  build-windows:
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with: {version: 9}
      - uses: actions/setup-node@v6
        with: {node-version: 22, cache: pnpm}
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: node scripts/sync-version.cjs
      - run: pnpm tauri build --bundles nsis
      - name: List Windows artifacts
        run: Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Recurse | Select-Object FullName,Length
      - uses: actions/upload-artifact@v7
        with:
          name: win-artifacts
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig

  upload-release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    env:
      ADMIN_API_BASE: ${{ secrets.ADMIN_API_BASE }}
      ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with: {version: 9}
      - uses: actions/setup-node@v6
        with: {node-version: 22, cache: pnpm}
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v7
        with:
          name: mac-artifacts
          path: src-tauri/target/release/bundle
      - uses: actions/download-artifact@v7
        with:
          name: win-artifacts
          path: src-tauri/target/release/bundle/nsis
      - name: Check release artifacts
        run: find src-tauri/target/release/bundle -type f
      - run: node scripts/release-upload.cjs
